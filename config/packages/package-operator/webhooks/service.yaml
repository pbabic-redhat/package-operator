apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: package-operator-system
  annotations:
    package-operator.run/phase: webhook
    service.beta.openshift.io/inject-cabundle: "true"
spec:
  ports:
    - port: 443
      targetPort: 8080
  selector:
    app.kubernetes.io/name: package-operator-webook-server
